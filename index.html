<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือคำนวณค่าธรรมเนียมการขายออนไลน์ - Ploypaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden; 
        }

        header {
            background-color: #f96096;
            background-image: linear-gradient(135deg, #fb89b2 0%, #f96096 100%);
            width: 100%;
            padding: 3rem 1.5rem 6rem 1.5rem;
            text-align: center;
            border-bottom-left-radius: 3rem;
            border-bottom-right-radius: 3rem;
            box-shadow: 0 10px 30px rgba(249, 96, 150, 0.15);
            position: relative;
        }

        .header-logo {
            @apply h-24 md:h-40 w-auto mx-auto object-contain transition-transform duration-500 drop-shadow-xl;
        }

        .main-container {
            @apply max-w-6xl mx-auto w-full px-4 sm:px-6 -mt-8 pb-20;
            position: relative;
            z-index: 20;
        }

        .main-card {
            @apply bg-white rounded-[2.5rem] md:rounded-[3.5rem] shadow-2xl shadow-gray-200/50 overflow-hidden border border-gray-100;
        }

        .content-area {
            @apply p-6 md:p-10 lg:p-12;
        }

        input[type="number"], select { 
            @apply w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-[#f96096]/10 focus:border-[#f96096] outline-none transition-all bg-gray-50 text-base; 
        }

        .input-label {
            @apply block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider ml-1;
        }

        /* Result Card - Adjusted to Light Theme with Dark Text */
        .result-card {
            @apply bg-gray-50 rounded-[2rem] p-6 md:p-8 text-gray-800 border border-gray-200 shadow-inner flex flex-col justify-center;
        }

        .btn-action {
            @apply w-full flex items-center justify-center px-8 py-4 bg-[#f96096] text-white rounded-2xl hover:bg-[#d84d7d] transition-all font-bold shadow-lg active:scale-95;
        }

        .fee-row {
            @apply flex justify-between text-sm text-gray-500 border-b border-gray-200 py-2 last:border-0;
        }

        /* Toggle Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e2e8f0;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #f96096; }
        input:checked + .slider:before { transform: translateX(20px); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body>

    <header>
        <div class="animate-up">
            <img src="https://cdn.shopify.com/s/files/1/0839/1278/6208/files/offi.png?v=1773728815" 
                 alt="ploypaw logo" 
                 class="header-logo">
            <div class="mt-4 space-y-1">
                <h1 class="text-white text-lg font-semibold tracking-wide">เครื่องมือคำนวณค่าธรรมเนียม</h1>
                <p class="text-white/70 text-[10px] uppercase tracking-[0.3em]">Smart Seller Tools by Ploypaw</p>
            </div>
        </div>
    </header>

    <main class="main-container animate-up" style="animation-delay: 0.2s;">
        <div class="main-card">
            <div class="content-area">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12">
                    
                    <div class="lg:col-span-4 space-y-6">
                        <div class="bg-gray-50/50 p-6 rounded-3xl border border-gray-100">
                            <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center">
                                <span class="w-8 h-8 bg-pink-100 text-[#f96096] rounded-lg flex items-center justify-center mr-3">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                                </span>
                                ตั้งค่าแพลตฟอร์ม
                            </h2>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="input-label">แอพพลิเคชั่น</label>
                                    <select id="platformSelect" onchange="loadPlatformSettings()">
                                        <option value="Shopee">Shopee</option>
                                        <option value="TikTok Shop">TikTok Shop</option>
                                        <option value="Lazada">Lazada</option>
                                        <option value="Custom">ปรับแต่งเอง</option>
                                    </select>
                                </div>
                                
                                <div id="feeSettings" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 pt-4 border-t border-gray-100">
                                    <!-- Dynamic Inputs -->
                                </div>

                                <button onclick="saveSettings()" class="w-full py-4 text-[#f96096] bg-white border-2 border-[#f96096] rounded-2xl hover:bg-pink-50 transition-all font-bold mt-4">
                                    บันทึกค่าพื้นฐาน
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-8 space-y-8">
                        <div id="itemsContainer" class="space-y-8">
                            <!-- Items will be injected here -->
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 pt-4">
                            <button onclick="addItem()" id="addItemBtn" class="btn-action flex-1">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                เพิ่มรายการสินค้า
                            </button>
                            <div class="flex items-center justify-center bg-gray-100 px-6 py-4 rounded-2xl text-gray-500 font-bold text-sm" id="itemCounter">
                                รายการ 1 / 5
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        let platforms = {
            "Shopee": {
                fees: [
                    { key: 'payment', label: 'Payment Transaction Fee (%)', val: 3.21, type: 'percent' },
                    { key: 'sale', label: 'Sale Transaction FeePlatform (%)', val: 10.7, type: 'percent' },
                    { key: 'service', label: 'PRIME Seller fee (%)', val: 8.56, type: 'percent' },
                    { key: 'infrastructure', label: 'Infrastructure Fee (Fixed)', val: 1.07, type: 'fixed' }
                ]
            },
            "TikTok Shop": {
                fees: [
                    { key: 'payment', label: 'Payment Transaction Fee (%)', val: 3.21, type: 'percent' },
                    { key: 'sale', label: 'Sale Transaction FeePlatform (%)', val: 7.49, type: 'percent' },
                    { key: 'promo', label: 'ส่งเสริมการขาย (%)', val: 6.96, type: 'percent' },
                    { key: 'infrastructure', label: 'Infrastructure Fee (Fixed)', val: 1.07, type: 'fixed' },
                    { key: 'live', label: 'ค่าธรรมเนียม Live Spacial (%)', val: 3.21, type: 'percent', toggle: true, enabled: false },
                    { key: 'brand', label: 'ค่าธรรมเนียม Brand Crazy Deal (%)', val: 3.21, type: 'percent', toggle: true, enabled: false }
                ]
            },
            "Lazada": {
                fees: [
                    { key: 'payment', label: 'Payment Transaction Fee (%)', val: 3.21, type: 'percent' },
                    { key: 'sale', label: 'Sale Transaction FeePlatform (%)', val: 10.0, type: 'percent' },
                    { key: 'service', label: 'Premium Package fee (%)', val: 4.0, type: 'percent' }
                ]
            },
            "Custom": {
                fees: [
                    { key: 'f1', label: 'ค่าธรรมเนียม 1 (%)', val: 0, type: 'percent' },
                    { key: 'f2', label: 'ค่าธรรมเนียม 2 (%)', val: 0, type: 'percent' }
                ]
            }
        };

        let items = [{ id: Date.now(), cost: 0, price: 0 }];
        const MAX_ITEMS = 5;

        function init() {
            const saved = localStorage.getItem('ploypaw_calc_v8');
            if (saved) platforms = JSON.parse(saved);
            loadPlatformSettings();
            renderItems();
        }

        function loadPlatformSettings() {
            const p = document.getElementById('platformSelect').value;
            const config = platforms[p];
            let html = '';
            config.fees.forEach((f, idx) => {
                if (f.toggle) {
                    html += `
                        <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-gray-100 shadow-sm">
                            <span class="text-[11px] font-bold text-gray-500 uppercase">${f.label}</span>
                            <label class="switch">
                                <input type="checkbox" ${f.enabled ? 'checked' : ''} onchange="updateToggleValue('${p}', ${idx}, this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `;
                } else {
                    html += `
                        <div>
                            <label class="input-label">${f.label}</label>
                            <input type="number" step="0.01" value="${f.val}" oninput="updateFeeValue('${p}', ${idx}, this.value)">
                        </div>
                    `;
                }
            });
            document.getElementById('feeSettings').innerHTML = html;
            calculateAll();
        }

        function updateFeeValue(p, idx, val) {
            platforms[p].fees[idx].val = parseFloat(val) || 0;
            calculateAll();
        }

        function updateToggleValue(p, idx, checked) {
            platforms[p].fees[idx].enabled = checked;
            calculateAll();
        }

        function saveSettings() {
            localStorage.setItem('ploypaw_calc_v8', JSON.stringify(platforms));
            showToast('บันทึกค่าธรรมเนียมแล้ว ✨');
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'border border-gray-100 rounded-[2rem] p-6 md:p-8 bg-white shadow-sm';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center space-x-3">
                            <span class="bg-[#f96096] text-white w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold">${index + 1}</span>
                            <h3 class="font-bold text-gray-800">สินค้าชิ้นที่ ${index + 1}</h3>
                        </div>
                        ${items.length > 1 ? `
                            <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 p-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        ` : ''}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="input-label">ต้นทุนสินค้า</label>
                                    <input type="number" value="${item.cost || ''}" oninput="updateItemData(${index}, 'cost', this.value)" placeholder="0.00">
                                </div>
                                <div>
                                    <label class="input-label">ราคาที่ตั้งขาย</label>
                                    <input type="number" value="${item.price || ''}" oninput="updateItemData(${index}, 'price', this.value)" placeholder="0.00" class="border-[#f96096]/30 bg-pink-50/20">
                                </div>
                            </div>
                            <div class="bg-gray-50 rounded-2xl p-4">
                                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">รายการหัก</p>
                                <div id="breakdown-${index}" class="space-y-1"></div>
                            </div>
                        </div>

                        <!-- Result Card - Dark Text Theme -->
                        <div class="result-card">
                            <div class="text-center mb-6">
                                <p class="text-gray-400 text-[10px] uppercase font-semibold tracking-widest mb-1">กำไรหลังหักค่าธรรมเนียม</p>
                                <div id="profit-${index}" class="text-4xl md:text-5xl font-bold tracking-tight text-gray-800">฿0.00</div>
                            </div>
                            <div class="space-y-3 pt-6 border-t border-gray-200">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-500 font-medium">ยอดรับสุทธิ:</span>
                                    <span id="payout-${index}" class="text-gray-800 font-bold">฿0.00</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 text-xs font-medium">Margin:</span>
                                    <span id="margin-${index}" class="px-4 py-1.5 rounded-full text-xs font-black bg-gray-200 text-gray-700">0%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('itemCounter').innerText = `รายการ ${items.length} / ${MAX_ITEMS}`;
            calculateAll();
        }

        function updateItemData(idx, key, val) {
            items[idx][key] = parseFloat(val) || 0;
            calculateAll();
        }

        function calculateAll() {
            const p = document.getElementById('platformSelect').value;
            const config = platforms[p];

            items.forEach((item, index) => {
                let totalFee = 0;
                let breakdownHtml = '';
                if (item.price > 0) {
                    config.fees.forEach(f => {
                        if (f.toggle && !f.enabled) return;

                        let amount = 0;
                        if (f.type === 'percent') {
                            amount = (item.price * f.val) / 100;
                        } else {
                            amount = f.val;
                        }
                        
                        totalFee += amount;
                        breakdownHtml += `<div class="fee-row"><span>${f.label}</span><span class="font-bold text-gray-700">฿${amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</span></div>`;
                    });
                } else {
                    breakdownHtml = '<div class="text-center text-gray-300 py-2 text-xs italic">รอระบุราคาขาย...</div>';
                }

                const payout = Math.max(0, item.price - totalFee);
                const profit = payout - item.cost;
                const margin = item.price > 0 ? (profit / item.price) * 100 : 0;

                const profitEl = document.getElementById(`profit-${index}`);
                if (profitEl) {
                    profitEl.innerText = `฿${profit.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    
                    if (profit < 0) {
                        profitEl.style.color = '#ef4444'; // Red for loss
                    } else {
                        profitEl.style.color = '#1f2937'; // Dark gray/black for profit
                    }

                    document.getElementById(`payout-${index}`).innerText = `฿${payout.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    const mEl = document.getElementById(`margin-${index}`);
                    mEl.innerText = `${margin.toFixed(2)}%`;
                    
                    if (margin < 0) {
                        mEl.style.color = '#ef4444';
                        mEl.style.backgroundColor = '#fee2e2';
                    } else {
                        mEl.style.color = '#059669'; // Green for positive margin
                        mEl.style.backgroundColor = '#d1fae5';
                    }
                    
                    document.getElementById(`breakdown-${index}`).innerHTML = breakdownHtml;
                }
            });
        }

        function addItem() {
            if (items.length < MAX_ITEMS) {
                items.push({ id: Date.now(), cost: 0, price: 0 });
                renderItems();
            }
        }

        function removeItem(idx) {
            items.splice(idx, 1);
            renderItems();
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full shadow-2xl z-50 font-medium text-sm transition-all duration-300 transform translate-y-2 opacity-0';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; }, 50);
            setTimeout(() => { 
                t.style.opacity = '0'; 
                t.style.transform = 'translateX(-50%) translateY(10px)';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
